<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Presentation Title</title>

    <!-- Lato font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,300;0,400;0,700;1,400&display=swap" rel="stylesheet" />

    <!-- MathJax -->
    <script>
      MathJax = {
        tex: { inlineMath: [['$','$']], displayMath: [['$$','$$']] },
        options: { skipHtmlTags: ['script','noscript','style','textarea'] },
        svg: { fontCache: 'global', scale: 1 },
      };
    </script>
    <script defer src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-svg.js"></script>

    <!-- Reveal.js base styles -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reset.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/theme/white.css" />

    <!-- SLAC theme (overrides white.css) -->
    <link rel="stylesheet" href="theme/css/slac-theme.css" />

  </head>
  <body>
    <div class="reveal">
      <div class="slides">

        <!--
          ═══════════════════════════════════════════════════════════════════
          SLIDES GO HERE
          Paste <section>...</section> snippets from the lcls-laser-slides
          library below. Each snippet is a self-contained slide.

          Title slide background options:
            data-background-image="theme/assets/backgrounds/title_bg.png"
            data-background-image="theme/assets/backgrounds/YOUR_IMAGE.jpg"
          Add your own background images to theme/assets/backgrounds/.
          ═══════════════════════════════════════════════════════════════════
        -->

      </div><!-- /.slides -->

      <!-- Stanford+DOE logo — visible on title slide only -->
      <img
        id="title-stanford-doe"
        src="theme/assets/logos/stanford_doe_logo.png"
        alt="Stanford University / U.S. Department of Energy"
        style="position:fixed; bottom:12px; right:18px; height:52px; width:auto; z-index:200; transition:opacity 0.3s;"
      />

      <!-- SLAC logo — visible on title slide only -->
      <img
        id="title-logo"
        src="theme/assets/logos/slac_logo.svg"
        alt="SLAC"
        style="position:fixed; bottom:12px; left:18px; height:52px; width:auto; z-index:200; transition:opacity 0.3s;"
      />

      <!-- Footnote overlay — content swapped per slide by slac-theme-config.js -->
      <div id="footnote-overlay"></div>

      <!-- Persistent footer (hidden on title slide) -->
      <div class="slac-footer" id="slac-footer">
        <img class="logo" src="theme/assets/logos/slac_logo_red.png" alt="SLAC" />
        <span class="footer-slide-num" id="footer-slide-num"></span>
      </div>

    </div><!-- /.reveal -->

    <!-- Reveal.js -->
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/dist/reveal.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.1.0/plugin/notes/notes.js"></script>

    <!-- SLAC theme config & chrome behaviour -->
    <script src="theme/js/slac-theme-config.js"></script>

  </body>
</html>
